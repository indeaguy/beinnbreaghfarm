<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beinn Breagh Farm</title>
  <link rel="preload" href="assets/fonts/dancing-script-400-latin.woff2" as="font" type="font/woff2">
  <style>
    @font-face {
      font-family: 'Dancing Script';
      font-style: normal;
      font-weight: 400;
      font-display: block;
      src: url('assets/fonts/dancing-script-400-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Spacing scale: 16 → 26 → 42 → 68 (each × φ 1.618) */

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background-color: #faf8f4;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 42px 24px;
    }

    header {
      text-align: left;
      margin-bottom: 26px;
    }

    /* Type scale: 1rem × φ = 1.618rem (h2), × φ² = 2.618rem (h1) */

    header h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 2.618rem;
      letter-spacing: 0.04em;
      font-weight: normal;
      color: #1a1a1a;
    }

    header h2 {
      font-size: 1.618rem;
      font-weight: normal;
      color: #2c2c2c;
      margin-top: 6px;
    }

    header p {
      margin-top: 10px;
      font-size: 1rem;
      color: #6b6b6b;
      font-style: italic;
    }

    .main {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 42px;
      width: 100%;
      max-width: 780px;
    }

    /* Column split: photo 38.2% (minor), form 61.8% (major) */

    .photo {
      flex: 0 0 46%;
      aspect-ratio: 9 / 16;
      background-color: #FFFFFF;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      order: 1;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .photo img.loaded {
      opacity: 1;
    }

    .photo-placeholder {
      color: #9e9690;
      font-size: 0.85rem;
      font-style: italic;
      text-align: center;
      padding: 24px;
    }

    .signup {
      flex: 61.8%;
      text-align: left;
      order: 2;
    }

    @media (max-width: 600px) {
      .main {
        flex-direction: column;
      }

      .photo {
        flex: 0 0 auto;
        width: 100%;
        max-width: 380px;
        order: 1;
      }

      .signup {
        text-align: center;
        order: 2;
      }

      header {
        text-align: center;
      }
    }

    .signup h2 {
      font-size: 1.618rem;
      font-weight: normal;
      margin-bottom: 16px;
    }

    .signup p {
      font-size: 1rem;
      color: #6b6b6b;
      margin-bottom: 26px;
      line-height: 1.618;
    }

    .signup form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .signup input,
    .signup textarea {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      font-family: inherit;
      border: 1px solid #c8c1b6;
      border-radius: 3px;
      background-color: #fff;
      color: #2c2c2c;
      outline: none;
      transition: border-color 0.2s;
    }

    .signup input:focus,
    .signup textarea:focus {
      border-color: #7a9e7e;
    }

    .signup textarea {
      resize: vertical;
      min-height: 120px;
    }

    .signup button {
      padding: 12px 16px;
      font-size: 1rem;
      font-family: inherit;
      background-color: #7a9e7e;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background-color 0.2s;
    }

    .signup button:hover {
      background-color: #5f8463;
    }

    footer {
      margin-top: 68px;
      font-size: 0.8rem;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="main">

  <div class="photo">
    <img src="assets/images/winter-barn-1200.jpg" alt="Beinn Breagh Farm in winter" fetchpriority="high" onload="this.classList.add('loaded')" onerror="this.classList.add('loaded')">
  </div>

  <div class="signup">
    <header>
      <h1>Beinn Breagh Farm</h1>
      <h2>Commercial Beef</h2>
      <p>651 Twin Oaks Road, Middleton, Nova Scotia</p>
      <p>Phone: <a href="tel:902091147">902-209-1147</a></p>
    </header>
    <p>Feel free to stop by, give us a call, or use the form to send us an email at <a href="mailto:penny@beinnbreaghfarm.ca">penny@beinnbreaghfarm.ca</a>.</p>
    <form id="contact-form">
      <input type="text" name="name" placeholder="Your name" required>
      <input type="email" name="email" placeholder="Your email" required>
      <textarea name="message" placeholder="Your message" required></textarea>
      <button type="submit">Send message</button>
    </form>
    <p id="form-status" style="display:none; margin-top:16px;"></p>
  </div>

  </div><!-- /.main -->

  <footer>
    &copy; 2026 Beinn Breagh Commercial Beef
  </footer>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      'https://jqrnhttdwbatkrrekkpl.supabase.co',
      'sb_publishable_ohLtq7lsVfRBPtS6QT2daw_L09nh31s'
    );

    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector('button');
      const status = document.getElementById('form-status');

      btn.disabled = true;
      btn.textContent = 'Sending…';

      const { error } = await supabase.from('contact_submissions').insert({
        name: form.name.value,
        email: form.email.value,
        message: form.message.value,
        project_id: 'c0a80101-0000-4000-a000-000000000001',
      });

      status.style.display = 'block';
      if (error) {
        status.style.color = '#c0392b';
        status.textContent = 'Something went wrong. Please try again or call us directly.';
        btn.disabled = false;
        btn.textContent = 'Send message';
      } else {
        status.style.color = '#5f8463';
        status.textContent = 'Message sent — we\'ll be in touch soon!';
        form.reset();
        btn.textContent = 'Send message';
      }
    });
  </script>
</body>
</html>
